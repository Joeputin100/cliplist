name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  jvm-tests:
    name: "JVM module tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run :core-format and :core-scan tests
        run: ./gradlew :core-format:test :core-scan:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: |
            core-format/build/reports/tests/
            core-scan/build/reports/tests/
          retention-days: 7

  android-build:
    name: "Android modules build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Android SDK 36 is pre-installed on ubuntu-latest runners.
      # No sdkmanager install step needed.

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Android modules
        run: ./gradlew :data-storage:assemble :app:assembleDebug :app:assembleRelease --no-daemon

      - name: Upload app-debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn
