name: Build and test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  jvm-tests:
    name: "JVM module tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Run :core-format and :core-scan tests
        run: ./gradlew :core-format:test :core-scan:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: jvm-test-reports
          path: |
            core-format/build/reports/tests/
            core-scan/build/reports/tests/
          retention-days: 7

  android-build:
    name: "Android modules build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      # Android SDK 36 is pre-installed on ubuntu-latest runners.
      # No sdkmanager install step needed.

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Assemble Android modules
        run: ./gradlew :data-storage:assemble :app:assembleDebug :app:assembleDebugAndroidTest :app:assembleRelease --no-daemon

      - name: Upload app-debug APK
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Upload androidTest APK
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-androidtest-apk
          path: app/build/outputs/apk/androidTest/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Upload release APK (unsigned)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: app-release-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: warn

  # On-device flow test (Firebase Test Lab). main-only to stay within FTL's free daily quota.
  ftl-flow-test:
    name: "FTL flow test (Android 14)"
    runs-on: ubuntu-latest
    needs: android-build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download app APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: app-debug-apk
          path: apk/app

      - name: Download androidTest APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: app-androidtest-apk
          path: apk/test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: static-webbing-461904-c4

      - name: Run FTL instrumentation flow test
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app apk/app/app-debug.apk \
            --test apk/test/app-debug-androidTest.apk \
            --test-targets "class com.cliplist.app.GenerateFlowTest,class com.cliplist.app.ResumeTest" \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --results-bucket=static-webbing-461904-c4-ftl-results \
            --timeout 300s --quiet

  # On-device R8 smoke test: sign the minified release APK with an ephemeral key, then Robo-crawl
  # it to confirm R8 / resource-shrinking didn't break startup. main-only.
  ftl-release-smoke:
    name: "FTL release R8 smoke (Android 14)"
    runs-on: ubuntu-latest
    needs: android-build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download release APK (unsigned)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: app-release-unsigned-apk
          path: apk/release

      - name: Sign the release APK with an ephemeral key
        run: |
          UNSIGNED=$(ls apk/release/*.apk | head -1)
          keytool -genkeypair -keystore /tmp/r.jks -storepass android -keypass android \
            -alias r -keyalg RSA -keysize 2048 -validity 30 -dname "CN=FTL R8 Smoke"
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          "$BT/zipalign" -f -p 4 "$UNSIGNED" /tmp/aligned.apk
          "$BT/apksigner" sign --ks /tmp/r.jks --ks-pass pass:android --key-pass pass:android \
            --out /tmp/app-release-signed.apk /tmp/aligned.apk
          "$BT/apksigner" verify /tmp/app-release-signed.apk && echo "release APK signed OK"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
        with:
          project_id: static-webbing-461904-c4

      - name: Robo-crawl the signed release (R8) build
        run: |
          gcloud firebase test android run \
            --type robo \
            --app /tmp/app-release-signed.apk \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --results-bucket=static-webbing-461904-c4-ftl-results \
            --timeout 120s --quiet

  # Sign the release with the real upload key and push it to Firebase App Distribution.
  distribute:
    name: "Firebase App Distribution"
    runs-on: ubuntu-latest
    needs: android-build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Decode upload keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Build signed release
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      # Use Google's first-party auth action + the official Firebase CLI rather than a third-party
      # action — the step handles the service-account key, so supply-chain trust matters here.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Push to Firebase App Distribution
        run: |
          npx --yes firebase-tools@13 appdistribution:distribute \
            "app/build/outputs/apk/release/app-release.apk" \
            --app "${{ secrets.FIREBASE_APP_ID }}" \
            --testers "joeputin100@gmail.com" \
            --release-notes "Automated build ${{ github.sha }}"
