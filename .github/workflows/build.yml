name: Build and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read

jobs:
  jvm-tests:
    name: "JVM module tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run :core-format and :core-scan tests
        run: ./gradlew :core-format:test :core-scan:test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jvm-test-reports
          path: |
            core-format/build/reports/tests/
            core-scan/build/reports/tests/
          retention-days: 7

  android-build:
    name: "Android modules build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Android SDK 36 is pre-installed on ubuntu-latest runners.
      # No sdkmanager install step needed.

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Android modules
        run: ./gradlew :data-storage:assemble :app:assembleDebug :app:assembleDebugAndroidTest :app:assembleRelease --no-daemon

      - name: Upload app-debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

      - name: Upload androidTest APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-androidtest-apk
          path: app/build/outputs/apk/androidTest/debug/*.apk
          retention-days: 7
          if-no-files-found: warn

  # On-device flow test (Firebase Test Lab). main-only to stay within FTL's free daily quota.
  ftl-flow-test:
    name: "FTL flow test (Android 14)"
    runs-on: ubuntu-latest
    needs: android-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download app APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: apk/app

      - name: Download androidTest APK
        uses: actions/download-artifact@v4
        with:
          name: app-androidtest-apk
          path: apk/test

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: static-webbing-461904-c4

      - name: Run FTL instrumentation flow test
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app apk/app/app-debug.apk \
            --test apk/test/app-debug-androidTest.apk \
            --test-targets "class com.cliplist.app.GenerateFlowTest" \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --timeout 300s --quiet
